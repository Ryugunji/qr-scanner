<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>สแกน QR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    h1 { font-size: 1.3em; margin-bottom: 16px; text-align: center; }
    #status { margin: 8px 0; padding: 10px 16px; border-radius: 8px; background: #333; font-size: 0.95em; text-align: center; width: 100%; max-width: 380px; }
    #status.ok { background: #1a6b1a; }
    #status.err { background: #6b1a1a; }
    .btn { display: block; width: 100%; max-width: 380px; padding: 14px; border: none; border-radius: 10px; font-size: 1.05em; cursor: pointer; margin-top: 10px; }
    .btn-primary { background: #f90; color: #000; font-weight: bold; }
    .btn-secondary { background: #555; color: #fff; }
    #fileInput { display: none; }
    #preview { max-width: 380px; width: 100%; border-radius: 10px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <h1>📷 สแกน QR เบิกของ</h1>
  <div id="status">กดปุ่มเพื่อเปิดกล้องถ่าย QR Code</div>
  <input type="file" id="fileInput" accept="image/*" capture="environment">
  <label for="fileInput" class="btn btn-primary">📷 เปิดกล้องถ่าย QR</label>
  <img id="preview" alt="preview">
  <button class="btn btn-secondary" onclick="goBack()">← กลับ</button>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    var retUrl = '';
    (function() {
      var params = new URLSearchParams(window.location.search);
      retUrl = params.get('ret') || '';
    })();

    var fileInput = document.getElementById('fileInput');
    var status = document.getElementById('status');
    var preview = document.getElementById('preview');

    fileInput.addEventListener('change', function() {
      var file = fileInput.files[0];
      if (!file) return;
      status.className = '';
      status.textContent = 'กำลังอ่าน QR...';
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          preview.src = e.target.result;
          preview.style.display = 'block';
          var canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) {
            status.className = 'ok';
            status.textContent = 'สแกนได้: ' + code.data;
            if (retUrl) {
              var dest = retUrl + (retUrl.indexOf('?') >= 0 ? '&' : '?') + 'qr=' + encodeURIComponent(code.data);
              setTimeout(function() { window.location.href = dest; }, 800);
            }
          } else {
            status.className = 'err';
            status.textContent = 'ไม่พบ QR Code ในรูป กรุณาถ่ายใหม่';
            fileInput.value = '';
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    function goBack() {
      if (retUrl) { window.location.href = retUrl; }
      else { history.back(); }
    }
  </script>
</body>
</html>
